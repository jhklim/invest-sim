spring:
  data:
    redis:
      host: localhost
      port: 6379

  datasource:
    url: jdbc:mysql://localhost:3307/invest?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    com.jhklim.investsim.adapter.in.websocket.TickProcessor: warn

jwt:
  secret: ${JWT_SECRET}
  expiration: 900000

upbit:
  markets: KRW-BTC

admin:
  email: ${ADMIN_EMAIL}
  password: ${ADMIN_PASSWORD}

test-account:
  email: ${TEST_EMAIL}
  password: ${TEST_PASSWORD}

app:
  signup:
    max-members: ${SIGNUP_MAX_MEMBERS:50}
  strategy:
    max-per-member: ${STRATEGY_MAX_PER_MEMBER:5}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}