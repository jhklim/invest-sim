spring:
  datasource:
    url: jdbc:mysql://mysql:3306/invest?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_ROOT_PASSWORD}
  data:
    redis:
      host: redis
      port: 6379
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false

logging:
  level:
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn
    com.jhklim.investsim.adapter.in.websocket.TickProcessor: warn

jwt:
  secret: ${JWT_SECRET}