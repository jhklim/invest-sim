services:
  mysql:
    image: mysql:8.0
    container_name: invest-mysql
    ports:
      - "${MYSQL_PORT}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      TZ: Asia/Seoul
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: invest-redis
    ports:
      - "${REDIS_PORT}:6379"

volumes:
  mysql-data: